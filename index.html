<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mini App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 20px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .user-message {
            align-self: flex-end;
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            border-bottom-right-radius: 4px;
        }
        .bot-message {
            align-self: flex-start;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
            border-bottom-left-radius: 4px;
        }
        #input-area {
            display: flex;
            padding: 16px;
            background: var(--tg-theme-bg-color, #ffffff);
            border-top: 1px solid var(--tg-theme-hint-color, #cccccc);
        }
        #message-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--tg-theme-hint-color, #cccccc);
            border-radius: 24px;
            outline: none;
            font-size: 16px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
        }
        #send-button {
            margin-left: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: 24px;
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        #send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #loading {
            text-align: center;
            padding: 20px;
            color: var(--tg-theme-hint-color, #888888);
        }
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 20px;
            color: var(--tg-theme-hint-color, #888888);
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: currentColor;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
    </style>
    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Подключаем Transformers.js с CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.14.0"></script>
</head>
<body>
    <div id="chat-container"></div>
    <div id="input-area">
        <input type="text" id="message-input" placeholder="Введите сообщение..." disabled>
        <button id="send-button" disabled>Отправить</button>
    </div>

    <script>
        (async function() {
            // Инициализация Telegram WebApp
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand(); // Растянуть на весь экран

            // Элементы DOM
            const chatContainer = document.getElementById('chat-container');
            const inputField = document.getElementById('message-input');
            const sendButton = document.getElementById('send-button');

            // Состояние приложения
            let model = null;
            let tokenizer = null;
            let pipeline = null;
            let isModelLoading = true;
            let isGenerating = false;
            const conversationHistory = [];

            // Показываем индикатор загрузки модели
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loading';
            loadingDiv.textContent = '⏳ Загрузка нейросети (TinyLlama 1.1B)... Это займёт около минуты при первом запуске.';
            chatContainer.appendChild(loadingDiv);

            // Функция добавления сообщения в чат
            function addMessage(text, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message', sender === 'user' ? 'user-message' : 'bot-message');
                messageDiv.textContent = text;
                chatContainer.appendChild(messageDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            // Функция показа индикатора "печатает"
            function showTypingIndicator() {
                const indicator = document.createElement('div');
                indicator.classList.add('typing-indicator');
                indicator.id = 'typing-indicator';
                indicator.innerHTML = '<span></span><span></span><span></span>';
                chatContainer.appendChild(indicator);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            function removeTypingIndicator() {
                const indicator = document.getElementById('typing-indicator');
                if (indicator) indicator.remove();
            }

            // Загрузка модели TinyLlama
            async function loadModel() {
                try {
                    // Используем квантованную версию TinyLlama для чата
                    pipeline = await Transformers.pipeline('text-generation', 'Xenova/TinyLlama-1.1B-Chat-v1.0', {
                        quantized: true, // используем int8 квантование для уменьшения размера
                    });
                    model = pipeline.model;
                    tokenizer = pipeline.tokenizer;
                    
                    // Убираем индикатор загрузки
                    if (loadingDiv) loadingDiv.remove();
                    
                    // Активируем интерфейс
                    inputField.disabled = false;
                    sendButton.disabled = false;
                    isModelLoading = false;
                    
                    // Приветственное сообщение
                    addMessage('Здравствуйте! Я нейросеть TinyLlama. Задайте мне любой вопрос.', 'bot');
                } catch (error) {
                    console.error('Ошибка загрузки модели:', error);
                    if (loadingDiv) loadingDiv.textContent = '❌ Не удалось загрузить модель. Обновите страницу.';
                }
            }

            // Генерация ответа
            async function generateResponse(userMessage) {
                if (isGenerating) return;
                isGenerating = true;
                sendButton.disabled = true;
                inputField.disabled = true;

                // Добавляем сообщение пользователя в историю
                conversationHistory.push({ role: 'user', content: userMessage });
                addMessage(userMessage, 'user');
                
                // Формируем промпт в формате, ожидаемом моделью
                // TinyLlama chat использует шаблон: <|user|>\n{user_message}\n<|assistant|>\n
                let prompt = '';
                for (const msg of conversationHistory) {
                    if (msg.role === 'user') {
                        prompt += `<|user|>\n${msg.content}\n`;
                    } else {
                        prompt += `<|assistant|>\n${msg.content}\n`;
                    }
                }
                prompt += '<|assistant|>\n';

                // Показываем индикатор
                showTypingIndicator();

                try {
                    // Генерация
                    const result = await pipeline(prompt, {
                        max_new_tokens: 256,
                        temperature: 0.7,
                        top_p: 0.9,
                        do_sample: true,
                        pad_token_id: tokenizer.eos_token_id,
                        eos_token_id: tokenizer.eos_token_id,
                    });
                    
                    // Извлекаем только новую сгенерированную часть
                    const fullText = result[0].generated_text;
                    const assistantReply = fullText.split('<|assistant|>\n').pop().trim();
                    
                    // Добавляем ответ в историю
                    conversationHistory.push({ role: 'assistant', content: assistantReply });
                    
                    // Убираем индикатор и показываем ответ
                    removeTypingIndicator();
                    addMessage(assistantReply, 'bot');
                } catch (error) {
                    console.error('Ошибка генерации:', error);
                    removeTypingIndicator();
                    addMessage('⚠️ Произошла ошибка при генерации ответа.', 'bot');
                } finally {
                    isGenerating = false;
                    sendButton.disabled = false;
                    inputField.disabled = false;
                    inputField.focus();
                }
            }

            // Обработчики событий
            sendButton.addEventListener('click', () => {
                const message = inputField.value.trim();
                if (message && !isModelLoading && !isGenerating) {
                    inputField.value = '';
                    generateResponse(message);
                }
            });

            inputField.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendButton.click();
                }
            });

            // Запускаем загрузку модели
            loadModel();
        })();
    </script>
</body>
</html>
